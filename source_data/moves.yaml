_id: legacies
datasworn_version: "0.1.0"
type: expansion
ruleset: classic
<<: &Source
  title: 'Ironsworn: Legacies - Playtest 1B'
  authors:
    - name: Shawn Tomkin
  license: null
  url: https://ironswornrpg.com
  date: 2026-06-20
moves:
  action:
    name: Action Moves
    type: move_category
    _source:
      <<: *Source
    summary: |-
      Take Action
    contents:
      take_action:
        name: Take Action
        type: move
        roll_type: action_roll
        trigger:
          text: When you attempt something risky and uncertain...
          conditions:
            - text: With agility, precision, or speed
              method: player_choice
              roll_options:
                - using: stat
                  stat: edge
            - text: With charm, fellowship, or resolve
              method: player_choice
              roll_options:
                - using: stat
                  stat: heart
            - text: With aggression, hardiness, or might
              method: player_choice
              roll_options:
                - using: stat
                  stat: iron
            - text: With cunning, deception, or stealth
              method: player_choice
              roll_options:
                - using: stat
                  stat: shadow
            - text: With expertise, insight, or observation
              method: player_choice
              roll_options:
                - using: stat
                  stat: wits
        _source:
          <<: *Source
        text: |-
          When __you attempt something risky and uncertain__, envision:
            * Intent: The success and advantages you hope to gain
            * Risk: The failure and misfortunes you might suffer
            * Method: The approach you use (choose below)
              * Edge: Acting with agility, precision, or speed
              * Heart: Acting with charm, fellowship, or resolve
              * Iron: Acting with aggression, hardiness, or might
              * Shadow: Acting with cunning, deception, or stealth
              * Wits: Acting with expertise, insight, or observation

          If your intent, risk, or method suggests a high-stakes outcome, you __tempt fate__ with this action.

          On a __strong hit__, it's a complete success.
            * Take +1 advantage.
            * If position is favored, take +1 advantage and gain momentum.
            * If you tempted fate, take +1 advantage.
            * Gain position, if not already favored.

          On a __weak hit__, it's a costly success.
            * Take +1 advantage and +1 misfortune.
            * If position is favored, take +1 advantage.
            * If position is desperate, take +1 misfortune.
            * If you tempted fate, take +1 advantage and +1 misfortune, and lose position.

          On a __miss__, it's an undone success or failure.
            * Take +1 misfortune
            * If position is desperate, take +1 misfortune and lose momentum.
            * If you tempted fate, take +1 misfortune.
            * Lose position, if not already desperate.

          Based on your intent, risk, and method, [Gain Advantage](datasworn:move:legacies/action/gain_advantage) and [Suffer Misfortune](datasworn:move:legacies/action/suffer_misfortune) to assign all effects. Envision the result.

          When you roll a match on the challenge dice, assign advantages and misfortunes to unexpected interpretations or effects.
        outcomes:
          strong_hit:
            text: |-
              On a __strong hit__, it's a complete success.
                * Take +1 advantage.
                * If position is favored, take +1 advantage and gain momentum.
                * If you tempted fate, take +1 advantage.
                * Gain position, if not already favored.
          weak_hit:
            text: |-
              On a __weak hit__, it's a costly success.
                * Take +1 advantage and +1 misfortune.
                * If position is favored, take +1 advantage.
                * If position is desperate, take +1 misfortune.
                * If you tempted fate, take +1 advantage and +1 misfortune, and lose position.
          miss:
            text: |-
              On a __miss__, it's an undone success or failure.
                * Take +1 misfortune
                * If position is desperate, take +1 misfortune and lose momentum.
                * If you tempted fate, take +1 misfortune.
                * Lose position, if not already desperate.
      gain_advantage:
        name: Gain Advantage
        type: move
        roll_type: no_roll
        trigger:
          text: When you achieve success...
        _source:
          <<: *Source
        text: |-
          When __you achieve success__, assign advantages to one or more effects. Each ● costs 1 advantage. You can assign advantages to multiples of one effect, but max 3 per effect.

          Advantage Effect | Cost
          ---- | ----
          **Mark challenge progress** | ●
          **Gain momentum** | ●
          **Overcome a setback** | ●
          **Mend a minor impact** | ●●
          **Find an opportunity**: A promising occurrence or insight offers leverage. Once only, if you [Take Action](datasworn:move:legacies/action/take_action) to act on the opportunity, set your position to favored and add +1. | ●●
          **Make a discovery**: A fateful revelation, sighting, or encounter advances your legacy. Once only, if you act on, investigate, or leverage the discovery, earn 2 boons. | ●●●
      suffer_misfortune:
        name: Suffer Misfortune
        type: move
        roll_type: no_roll
        trigger:
          text: When you fail or pay a cost...
        _source:
          <<: *Source
        text: |-
          When __you fail or pay a cost__, assign misfortunes to one or more effects. Each ● costs 1 misfortune. You can assign misfortunes to multiples of one effect, but max 3 per effect.

          Misfortune Effect | Cost
          ---- | ----
          **Mark an impact** | ●
          **Lose momentum** | ●
          **Face a setback**: A complication blocks your progress To move forward, [Take Action](datasworn:move:legacies/action/take_action) and overcome a setback. | ●
          **Increase tension**: Danger looms. Add or mark a four-segment tension timer (mark two segments on a match). Once you mark the last segment, encounter a peril. | ●
          **Encounter a peril**: The situation worsens. [Take on a Challenge](datasworn:move:legacies/challenge/take_on_a_challenge), abandon an existing challenge, or both. | ●●
          **Trigger a crisis**: A fateful event threatens your legacy. If you [Undertake a Quest](datasworn:move:legacies/quest/undertake_a_quest) to oppose the crisis, earn 2 boons. If not, clear legacy (2 legacy for a lost advancement). | ●●●
  quest:
    name: Quest Moves
    type: move_category
    _source:
      <<: *Source
    summary: |-
      Undertake a Quest
    contents:
      undertake_a_quest:
        name: Undertake a Quest
        type: move
        roll_type: no_roll
        trigger:
          text: When you commit to defeat a menace, undo a wrong, answer a call to action, or pursue an ambition...
        _source:
          <<: *Source
        text: |-
          When __you commit to defeat a menace, undo a wrong, answer a call to action, or pursue an ambition__, give the quest a name and progress track. If unsure of the rank, make it formidable.

          If you swear an iron vow to see the quest done, mark this as a __sworn quest__.

          Move forward on the quest by completing crucial challenges, gaining vital support, and other important achievements. When you do, mark progress per the quest rank.
      reach_a_milestone:
        name: Reach a Milestone
        type: move
        roll_type: no_roll
        trigger:
          text: When you complete a crucial challenge or gain success in some other meaningful aspect of the quest__...
        _source:
          <<: *Source
        text: |-
          When __you complete a crucial challenge or gain success in some other meaningful aspect of the quest__, mark progress per the quest rank.
      resolve_a_quest:
        name: Resolve a Quest
        type: move
        roll_type: progress_roll
        tracks:
          category: Quest
        trigger:
          text: When you reach what you believe is the end of the quest...
          conditions:
            - roll_options:
                - using: progress_track
        _source:
          <<: *Source
        text: |-
          When __you reach what you believe is the end of the quest__, test your progress score against the challenge dice.

          On a __strong hit__, the quest is complete. Mark legacy per the quest's rank: troublesome=1, dangerous=2, formidable=3, extreme=4, epic=5. If the quest was a sworn quest, mark 1 more legacy.

          On a __weak hit__, the quest is complete, but with an unexpected twist, concession, or new obligation. Mark legacy as with a strong hit, but one rank lower (0 if troublesome). If the quest was a sworn quest, mark 1 more legacy.

          On a __miss__, the quest fails. Envision the consequences of this dramatic turn of events. Clear legacy per the quest's rank: troublesome=1, dangerous=2, formidable=3, extreme=4, epic=5. If you [Undertake a Quest](datasworn:move:legacies/quest/undertake_a_quest) (of equal or greater rank) to set things right, make the legacy cost one rank lower (0 if troublesome). If it was a sworn quest, clear 1 more legacy.
        outcomes:
          strong_hit:
            text: "On a __strong hit__, the quest is complete. Mark legacy per the quest's rank: troublesome=1, dangerous=2, formidable=3, extreme=4, epic=5. If the quest was a sworn quest, mark 1 more legacy."
          weak_hit:
            text: "On a __weak hit__, the quest is complete, but with an unexpected twist, concession, or new obligation. Mark legacy one rank lower per the quest's rank: troublesome=0, dangerous=1, formidable=2, extreme=3, epic=4. If the quest was a sworn quest, mark 1 more legacy."
          miss:
            text: "On a __miss__, the quest fails. Envision the consequences of this dramatic turn of events. Clear legacy per the quest's rank: troublesome=1, dangerous=2, formidable=3, extreme=4, epic=5. If you [Undertake a Quest](datasworn:move:legacies/quest/undertake_a_quest) (of equal or greater rank) to set things right, make the legacy cost one rank lower (0 if troublesome). If it was a sworn quest, clear 1 more legacy."
      forsake_a_quest:
        name: Forsake a Quest
        type: move
        roll_type: no_roll
        trigger:
          text: When you prematurely lose or renounce the quest...
        _source:
          <<: *Source
        text: |-
          When __you prematurely lose or renounce the quest__, envision the consequences of this dramatic turn of events. Clear legacy per the quest's rank: troublesome=1, dangerous=2, formidable=3, extreme=4, epic=5. If you [Undertake a Quest](datasworn:move:legacies/quest/undertake_a_quest) (of equal or greater rank) to set things right, make the legacy cost one rank lower (0 if troublesome). If it was a sworn quest, clear 1 more legacy.
  challenge:
    name: Challenge Moves
    type: move_category
    _source:
      <<: *Source
    summary: |-
      Take on a Challenge
    contents:
      take_on_a_challenge:
        name: Take on a Challenge
        type: move
        roll_type: no_roll
        trigger:
          text: When you face a lengthy effort, hazardous encounter, or complex task...
        _source:
          <<: *Source
        text: |-
          When __you face a lengthy effort, hazardous encounter, or complex task__, name the challenge objective and give it a progress track. If unsure of the rank, make it formidable.

          To push towards the objective, [Take Action](datasworn:move:legacies/action/take_action). On a hit, [Gain Advantage](datasworn:move:legacies/action/gain_advantage), choose the _mark challenge progress_ effect, and mark progress per the challenge rank.

          If a setback or another challenge stands in the way of your progress, resolve that hindrance first.

          If you prematurely lose or quit the challenge, remove it from play and [Suffer Misfortune](datasworn:move:legacies/action/suffer_misfortune) (+1 misfortune or more as appropriate).
      resolve_a_challenge:
        name: Resolve a Challenge
        type: move
        roll_type: progress_roll
        tracks:
          category: Challenge
        trigger:
          text: When the objective is in reach and you attempt a decisive finish...
          conditions:
            - roll_options:
                - using: progress_track
        _source:
          <<: *Source
        text: |-
          When __the objective is in reach and you attempt a decisive finish__, test your progress score against the challenge dice.

          On a __strong hit__, you complete the challenge.
            * Take +1 advantage.
            * If position is favored, take +1 advantage and gain momentum.
            * Gain position, if not already favored.

          On a __weak hit__, you complete the challenge at a cost.
            * Take +1 misfortune.
            * If position is pressured, take +1 misfortune.
            * If position is desperate, take +2 misfortune.

          On a __miss__, the challenge fails.
            * Take +2 misfortune.
            * If position is pressured, take +1 misfortune.
            * If position is desperate, take +2 misfortune and lose momentum.
            * Lose position, if not already desperate.

          Earn boons for a completed challenge as follows. If you abandoned or failed the challenge, take no reward.
            * Base reward: 1 boon
            * Demanding reward: +1 boon for a formidable or extreme challenge, +2 for an epic challenge.
            * Milestone reward: +1 boon if the challenge is a quest milestone (no more than one milestone per situation).
        outcomes:
          strong_hit:
            text: |-
              On a __strong hit__, you complete the challenge.
                * Take +1 advantage.
                * If position is favored, take +1 advantage and gain momentum.
                * Gain position, if not already favored.
                * Earn boons for a completed challenge as follows. If you abandoned or failed the challenge, take no reward.
                  * Base reward: 1 boon
                  * Demanding reward: +1 boon for a formidable or extreme challenge, +2 for an epic challenge.
                  * Milestone reward: +1 boon if the challenge is a quest milestone (no more than one milestone per situation).
          weak_hit:
            text: |-
              On a __weak hit__, you complete the challenge at a cost.
                * Take +1 misfortune.
                * If position is pressured, take +1 misfortune.
                * If position is desperate, take +2 misfortune.
                * Earn boons for a completed challenge as follows. If you abandoned or failed the challenge, take no reward.
                  * Base reward: 1 boon
                  * Demanding reward: +1 boon for a formidable or extreme challenge, +2 for an epic challenge.
                  * Milestone reward: +1 boon if the challenge is a quest milestone (no more than one milestone per situation).
          miss:
            text: |-
              On a __miss__, the challenge fails.
                * Take +2 misfortune.
                * If position is pressured, take +1 misfortune.
                * If position is desperate, take +2 misfortune and lose momentum.
                * Lose position, if not already desperate.
  pass_time:
    name: Pass Time
    type: move_category
    _source:
      <<: *Source
    summary: |-
      Pass Time
    contents:
      pass_time:
        name: Pass Time
        type: move
        roll_type: no_roll
        trigger:
          text: you take a break, experience a lengthy delay or distraction, pursue a complex personal project, or are unwillingly pulled from your adventures...
        _source:
          <<: *Source
        text: |-
          When __you take a break, experience a lengthy delay or distraction, pursue a complex personal project, or are unwillingly pulled from your adventures__, time moves on.

          Perform the following steps:

          1. **Recover (optional)**
            If you have the means, envision how you regain readiness and do any of the following:
              * Mend severe impacts: Spend 2 boons to mend each severe impact. If you recover at a haven, mend one severe impact at no cost.
              * Mend minor impacts: Automatically mend any minor impacts (must mend severe impacts of same category first).
              * Mend lasting impacts: Lock a minor impact of the same category, then mend the lasting impact.
              * Reset momentum: Set momentum to its reset value.
              * Adjust position: Set position to favored.

          2. **Work on a downtime project (optional)**
            [Take Action](datasworn:move:legacies/action/take_action) to work on a single complex project. On a hit, the project is complete and you earn 1 boon. In addition, you may convert any advantages gained on this action to boons.

          3. **Explore an interlude (optional)**
            If not in danger, give focus to a single low-stakes interaction or situation during downtime. You may [Take Action](datasworn:move:legacies/action/take_action) when facing a minor risk or obstacle during an interlude. If you do, set your position to favored and do not tempt fate. If the outcome of the interlude is meaningful from your character’s perspective, earn 1 boon.

          4. **Gather rewards**
            Earn 2 boons for each thriving haven. If an asset offers specific benefits when you Pass Time, take that reward.

          5. **Manage world events**
            To see what happens with other entities and threats as time passes, complete these procedures:
              * Manage world timers: Play the World to see if other entities advance their agendas.
              * Reveal dangers: [Test Your Legacy](datasworn:move:legacies/legacy/test_your_legacy) to see if you face sudden or emerging threats.
  legacy:
    name: Legacy Moves
    type: move_category
    _source:
      <<: *Source
    summary: |-
      Legacy Movies
    contents:
      test_your_legacy:
        name: Test Your Legacy
        type: move
        roll_type: action_roll
        trigger:
          text: When you Pass Time or encounter a lull in your adventures...
          conditions:
            - text: With expertise, insight, or observation
              method: player_choice
              roll_options:
                - using: condition_meter
                  condition_meter: legacy_tier
        _source:
          <<: *Source
        text: |-
          When __you [Pass Time](datasworn:move:legacies/pass_time/pass_time) or encounter a lull in your adventures__, test your legacy against the uncertainties of a perilous world.

          On a __strong hit__, you gain insight into an existing quest or danger; envision what you learn. On a __strong hit with a match__, help arrives from a surprising source; earn boons equal to your tier (1 boon if tier 0).

          On a __weak hit__, your legacy offers some measure of control against potential threats. Choose a threat on the table below (instead of rolling).

          On a __miss__, your legacy is lacking, falters, or provokes trouble. Roll a single D10, add your tier, and identify a threat using the table below. On a __miss with a match__, as you reveal a threat, roll twice and take the highest result.

          Tier + d10 | Threat Details
          ---- | ----
          1-5 | **Local Trouble**: A small-scale problem, conflict, or dilemma draws your attention.
          6 | **Confrontation**: A rival, foe, or other danger targets you.
          7 | **Obligation**: An individual, community, or faction asks for help or makes a demand. Answer the call or clear legacy.
          8-9 | **Deadline**: A threat grows or an adversary prepares to act. Add a four-segment world timer. Once fully marked, trigger a dilemma (below).
          10–11 | **Dilemma**: An important location, individual, community, or faction faces a critical situation. Resolve the issue before you next [Pass Time](datasworn:move:legacies/pass_time/pass_time); if you don’t, a tragedy occurs (below).
          12+ | **Tragedy**: An important location, individual, community, or faction suffers a calamity or forsakes you. Clear legacy. If the target of the tragedy is an advancement, it is lost; clear another legacy.

        outcomes:
          strong_hit:
            text: On a __strong hit__, you gain insight into an existing quest or danger; envision what you learn. On a __strong hit with a match__, help arrives from a surprising source; earn boons equal to your tier (1 boon if tier 0).
          weak_hit:
            text: On a __weak hit__, your legacy offers some measure of control against potential threats. Choose a threat on the table below (instead of rolling).
          miss:
            text: On a __miss__, your legacy is lacking, falters, or provokes trouble. Roll a single D10, add your tier, and identify a threat using the table below. On a __miss with a match__, as you reveal a threat, roll twice and take the highest result.
      end_your_legacy:
        name: End Your Legacy
        type: move
        roll_type: action_roll
        trigger:
          text: When you succumb to death or desolation, fade from the world, or retire from your life as an adventurer...
          conditions:
            - text: With expertise, insight, or observation
              method: player_choice
              roll_options:
                - using: condition_meter
                  condition_meter: legacy_tier
        _source:
          <<: *Source
        text: |-
          When __you succumb to death or desolation, fade from the world, or retire from your life as an adventurer__, test the strength of your legacy to see what endures.

          On a __strong hit__, your legacy perseveres. Pass on a legacy using the options below (●● per tier). On a __strong hit with a match__, your exploits or sacrifice become legend, inspiring those who follow. Gain a tier at the start of a new campaign.

          On a __weak hit__, your legacy lingers. Pass on a legacy using the options below (● per tier).

          On a __miss__, your legacy fades. On a __miss with a match__, a wholly unexpected threat or calamity erases your legacy.

          Enduring Legacies | Costs
          ---- | ----
          **Follow in their footsteps**: Take an asset held by the previous character, including any marked abilities, as one of the three starting assets for a new character | ●
          **Accept an inheritance**: Gain a resource with up to three marked qualities at no cost. | ●
          **Share a connection**: Retain a bond advancement. | ●
          **Maintain a refuge**: Retain a haven advancement and all passage advancements connected to that location. | ●●
          **Build on their legacy**: Gain a tier at the beginning of a new campaign (max starting tier is 2). | ●●●

        outcomes:
          strong_hit:
            text: On a __strong hit__, your legacy perseveres. Pass on a legacy using the options below (●● per tier). On a __strong hit with a match__, your exploits or sacrifice become legend, inspiring those who follow. Gain a tier at the start of a new campaign.
          weak_hit:
            text: On a __weak hit__, your legacy lingers. Pass on a legacy using the options below (● per tier).
          miss:
            text: On a __miss__, your legacy fades. On a __miss with a match__, a wholly unexpected threat or calamity erases your legacy.
