    contents:
      environment:
        name: Fight Environment
        type: oracle_rollable
        oracle_type: table_text
        _source:
          <<: *Source
        rows:
          - roll: { min: 1, max: 5 }
            text: '**High ground**: Mound, outcropping, climbable structure'
          - roll: { min: 6, max: 10 }
            text: '**Cluttered terrain**: Rubble, rocks, roots'
          - roll: { min: 11, max: 15 }
            text: '**Scattered cover**: Low walls, boulders, trees, crates'
          - roll: { min: 16, max: 20 }
            text: '**Hindering terrain**: Water, muck, snow, thickets'
          - roll: { min: 21, max: 25 }
            text: '**Obstructed path**: Barricade, toppled ruin, fallen tree'
          - roll: { min: 26, max: 30 }
            text: '**Bounded space**: Dueling circle, clearing, standing stones'
          - roll: { min: 31, max: 35 }
            text: '**Cramped spaces**: Narrow tunnel, crowded room, dense woods'
          - roll: { min: 36, max: 40 }
            text: '**Pitched terrain**: Steep hillside, rooftop, collapsed ruin, ship deck'
          - roll: { min: 41, max: 45 }
            text: '**Choke point**: Bridge, corridor, river ford, narrow defile'
          - roll: { min: 46, max: 50 }
            text: '**Impassable barrier**: Deep waterway, high wall, cliff face'
          - roll: { min: 51, max: 55 }
            text: '**Low visibility**: Darkness, smoke, fog, torrential rain'
          - roll: { min: 56, max: 60 }
            text: '**Precipitous drop**: Cliff edge, ravine, pit, plummeting stairs'
          - roll: { min: 61, max: 65 }
            text: '**Slippery surface**: Mud, ice, scree, rain-slick rocks'
          - roll: { min: 66, max: 70 }
            text: '**Fragile terrain**: Crumbling ruins, thin ice, undermined earth'
          - roll: { min: 71, max: 75 }
            text: '**Frantic distractions**: Noncombatants, creatures, insect swarms'
          - roll: { min: 76, max: 80 }
            text: '**Hidden hazard**: Trap, sinkhole, lurking creature, ambushers'
          - roll: { min: 81, max: 85 }
            text: '**Treacherous ground**: Fire pit, boiling hot spring, quagmire'
          - roll: { min: 86, max: 90 }
            text: '**Destructive chaos**: Storm, fire, flooding, rampaging creature'
          - roll: { min: 91, max: 95 }
            text: '**Unnatural forces**: Mystic energies, corruption, eldritch monuments'
          - roll: { min: 96, max: 100 }
            text: '**Cursed ground**: Corpses, risen dead, specters, blighted terrain'
