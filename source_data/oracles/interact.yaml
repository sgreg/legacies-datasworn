      moments:
        name: Interact Moments
        type: oracle_rollable
        oracle_type: table_text
        _source:
          <<: *Source
        summary: To add minor details or introspective moments, ask and answer questions about the interaction from your character’s perspective. For inspiration, use the table below.
        rows:
          - roll: { min: 1, max: 10 }
            text: What minor distraction draws your attention?
          - roll: { min: 11, max: 20 }
            text: What subtle cue contradicts their words?
          - roll: { min: 21, max: 30 }
            text: What aspect hints at their past?
          - roll: { min: 31, max: 40 }
            text: What causes the mood to shift?
          - roll: { min: 41, max: 50 }
            text: What small detail catches your eye?
          - roll: { min: 51, max: 60 }
            text: What unexpected connection reveals itself?
          - roll: { min: 61, max: 70 }
            text: What memory does this interaction evoke?
          - roll: { min: 71, max: 80 }
            text: What uncomfortable truth remains unspoken?
          - roll: { min: 81, max: 90 }
            text: What bold question are you tempted to ask?
          - roll: { min: 91, max: 100 }
            text: What tradition influences this interaction?
