          abilities:
            - name: Helpful
              text: When you [Take Action](datasworn:move:legacies/action/take_action) using or aided by the resource, add +1.
            - name: Durable
              text: Add two additional impact slots to the resource (four total).
            - name: Effective
              text: When you pursue a new challenge objective with the direct aid of the resource, reduce the rank by one step.
            - name: Fated
              text: Before you roll to finish a challenge, decide if you commit the resource. If you do, reroll any dice and lose the resource.
            - name: Protective
              text: When you [Take Action](datasworn:move:legacies/action/take_action), you can improve the result by one step (miss to weak hit, or weak hit to strong hit). If you do, mark a resource impact.
            - name: Resilient
              text: Impacts on this resource are unlocked. They can mend as standard minor impacts, but at a cost (2 boons per impact).
            - name: Restorative
              text: Mend two minor impacts on another target in exchange for marking an impact on this resource.
            - name: Special
              text: The resource grants access to actions or challenges that are otherwise beyond your scale or capabilities.
